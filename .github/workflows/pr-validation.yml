name: Validate PR

# Runs on `pull_request_target` rather than `pull_request` so the workflow
# file and `scripts/validate-pr.sh` are always taken from `master`, not from
# the PR branch. Combined with the validator's rule that no PR may touch a
# directory whose name starts with `.` (which covers `.github/`), this means
# a contributor cannot disable or weaken validation by editing CI in their
# PR — the base-branch validator runs first and closes the PR.
#
# `pull_request_target` exposes a write-scoped `GITHUB_TOKEN`, which is only
# safe because this workflow never executes any code from the PR — it only
# inspects file metadata via the GitHub API.

on:
  pull_request_target:
    branches: [master]
    types: [opened, reopened, synchronize, edited]

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # to close invalid PRs with a reason comment

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
      - name: Validate PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./scripts/validate-pr.sh
